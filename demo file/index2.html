<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* --- Base Desktop Styling Framework --- */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 10%;
    background-color: #1f242d; /* Adjust color to match your portfolio theme */
    position: fixed;
    width: 100%;
    top: 0;
    left: 0;
    z-index: 100;
    box-sizing: border-box;
}

.logo {
    font-size: 25px;
    color: #fff;
    text-decoration: none;
    font-weight: 600;
}

.navbar {
    display: flex;
    gap: 35px;
}

.navbar .nav-link {
    font-size: 18px;
    color: #fff;
    text-decoration: none;
    font-weight: 500;
    transition: .3s;
}

/* --- Dynamic Toggle Button Construction --- */
.menu-toggle {
    display: none; /* Hidden on desktop screens */
    flex-direction: column;
    justify-content: space-between;
    width: 30px;
    height: 20px;
    cursor: pointer;
}

.menu-toggle span {
    width: 100%;
    height: 3px;
    background-color: #fff;
    border-radius: 5px;
    transition: all 0.3s ease-in-out;
}

/* --- Mobile Responsiveness (Under 768px Viewports) --- */
@media (max-width: 768px) {
    .menu-toggle {
        display: flex; /* Displays button on mobile layouts */
    }

    .navbar {
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background-color: #1f242d;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        
        /* Animation properties using max-height */
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.4s ease-in-out, padding 0.4s ease-in-out;
        box-shadow: 0 5px 10px rgba(0,0,0,0.2);
    }

    /* Active state injected by JS to roll the links down smoothly */
    .navbar.active {
        max-height: 350px; 
        padding: 25px 0;
    }

    /* --- Morphing Hamburger into an 'X' symbol --- */
    /* Top line morph */
    .menu-toggle.active span:nth-child(1) {
        transform: translateY(8.5px) rotate(45deg);
    }
    /* Hide the center line */
    .menu-toggle.active span:nth-child(2) {
        opacity: 0;
    }
    /* Bottom line morph */
    .menu-toggle.active span:nth-child(3) {
        transform: translateY(-8.5px) rotate(-45deg);
    }
}
  </style>
</head>
<body>
     <header class="header">
            <a href="#" class="logo">PortFolio..</a>
             <div class="menu-toggle" id="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
      <nav class="navbar" id="navbar">
        <a href="#homee" style="--i:1" class="nav-link">Home</a>
        <a href="#about" style="--i:2" class="nav-link">About</a>
        <a href="#SRVC" style="--i:3" class="nav-link">Services</a>
        <a href="#skillss" style="--i:4" class="nav-link">Skills</a>
        <a href="#contactt" style="--i:5" class="nav-link">Contact</a>
      </nav>
    </header>
 <script>
  (() => {
    const menuToggle = document.getElementById("menu-toggle");
    const navbar = document.getElementById("navbar");

    if (!menuToggle || !navbar) return; // Safeguard if elements aren't ready

    // Toggle menu state on button click
    menuToggle.addEventListener("click", () => {
        menuToggle.classList.toggle("active");
        navbar.classList.toggle("active");
    });

    // Automatically collapse navigation menu once an individual link item is clicked
    const navLinks = navbar.querySelectorAll(".nav-link");
    navLinks.forEach(link => {
        link.addEventListener("click", () => {
            menuToggle.classList.remove("active");
            navbar.classList.remove("active");
        });
    });
})();
 </script>
</body>
</html>
